name: Publish

on:
  push:
    tags: [ "v*.*.*" ]
    branches:
      - "main"

jobs:
  test:
    uses: ./.github/workflows/_test.yml
    with:
      elixir-version: "1.18.4"
      otp-version: "28.0.1"

  build:
    needs: test
    uses: ./.github/workflows/_docker.yml
    with:
      elixir-version: "1.18.4"
      otp-version: "28.0.1"
      push: true
      stable: ${{ startsWith(github.ref, 'refs/tags/v') }}
    secrets: inherit
